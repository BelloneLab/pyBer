name: Build and Publish

on:
  push:
    branches: [main, master, Pyber_v0.15]
    tags: ["v*"]
  pull_request:
    branches: [main, master, Pyber_v0.15]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: pyBer
          auto-activate-base: false
          environment-file: environment.yml
          channels: conda-forge
          channel-priority: strict
          use-mamba: true

      - name: Show build environment
        run: |
          python --version
          python -m pip --version
          python -c "import os, sys; print('CONDA_PREFIX=', os.environ.get('CONDA_PREFIX')); print('PYTHON=', sys.executable)"

      - name: Build Windows icon from assets
        run: |
          python -m pip install --upgrade pillow
          mkdir -p build
          python - <<'PY'
          from pathlib import Path
          from PIL import Image

          src = Path("assets/pyBer_logo_big.png")
          dst = Path("build/pyBer_logo_big.ico")
          if not src.exists():
              raise SystemExit(f"Missing icon source: {src}")

          img = Image.open(src).convert("RGBA")
          sizes = [(256, 256), (128, 128), (64, 64), (48, 48), (32, 32), (16, 16)]
          img.save(dst, format="ICO", sizes=sizes)
          print(f"Wrote {dst}")
          PY

      - name: Build with PyInstaller (last known good method)
        run: |
          DLLS=(
            "hdf5.dll"
            "hdf5_hl.dll"
            "zlib.dll"
            "blosc.dll"
            "libblosc2.dll"
            "libmmd.dll"
            "libifcoremd.dll"
            "libifportmd.dll"
            "libiomp5md.dll"
            "libimalloc.dll"
            "svml_dispmd.dll"
            "libpng16.dll"
            "freetype.dll"
          )

          ADD_ARGS=()
          for dll in "${DLLS[@]}"; do
            dll_path="$CONDA_PREFIX/Library/bin/$dll"
            if [[ -f "$dll_path" ]]; then
              echo "Bundling $dll"
              ADD_ARGS+=(--add-binary "$dll_path;.")
            else
              echo "Skipping missing $dll"
            fi
          done

          python -m PyInstaller \
            --noconfirm \
            --clean \
            --onefile \
            --windowed \
            --icon build/pyBer_logo_big.ico \
            --add-data "assets;assets" \
            --name pyBer \
            "${ADD_ARGS[@]}" \
            pyBer/main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/pyBer.exe
          if-no-files-found: error

  publish:
    needs: [build-windows]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/Pyber_v0.15' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: ./publish

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./publish/*"
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
          allowUpdates: true
          tag: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Build' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
