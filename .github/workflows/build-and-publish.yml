name: Build and Publish

on:
  push:
    branches: [main, master, Pyber_v0.15]
    tags: ["v*"]
  pull_request:
    branches: [main, master, Pyber_v0.15]
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_VERSION: v0.21

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      PYTHONNOUSERSITE: "1"
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: pyBer
          auto-activate-base: false
          environment-file: environment.yml
          channels: conda-forge
          channel-priority: strict
          use-mamba: true

      - name: Show build environment
        run: |
          python --version
          python -m pip --version
          python -m PyInstaller --version
          python -c "import os, sys; print('CONDA_PREFIX=', os.environ.get('CONDA_PREFIX')); print('PYTHON=', sys.executable)"

      - name: Verify build inputs
        run: |
          test -f pyBer.spec
          test -f assets/pyBer_logo_big.png
          test -f assets/pyBer.ico
          python - <<'PY'
          import numpy, scipy, h5py, sklearn
          print("Import smoke test OK")
          print("numpy:", numpy.__version__)
          print("scipy:", scipy.__version__)
          print("h5py:", h5py.__version__)
          print("sklearn:", sklearn.__version__)
          PY

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --noconfirm --clean pyBer.spec

      - name: Smoke test built EXE
        run: |
          export PYBER_SMOKE_TEST=1
          ./dist/pyBer.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyber-windows-exe
          path: dist/pyBer.exe
          if-no-files-found: error

  publish:
    needs: [build-windows]
    if: |
      needs.build-windows.result == 'success' && (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/Pyber_v0.15' || startsWith(github.ref, 'refs/tags/'))
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: pyber-windows-exe
          path: ./publish

      - name: Normalize Release Asset Name
        run: |
          set -euo pipefail
          exe_path="$(find ./publish -type f -name '*.exe' | head -n 1 || true)"
          if [[ -z "$exe_path" ]]; then
            echo "No EXE found in downloaded artifact"
            find ./publish -maxdepth 4 -type f -print || true
            exit 1
          fi
          cp "$exe_path" ./publish/pyBer-windows.exe

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./publish/pyBer-windows.exe"
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          tag: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || env.RELEASE_VERSION }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || env.RELEASE_VERSION }}
          prerelease: false
