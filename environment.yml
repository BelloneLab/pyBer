name: pyBer
channels:
  - conda-forge

variables:
  PYTHONNOUSERSITE: "1"

dependencies:
  # Core
  - python=3.11

  # Numeric and signal processing
  - libblas=*=*openblas
  - liblapack=*=*openblas
  - libcblas=*=*openblas
  - numpy>=1.24
  - scipy>=1.10
  - h5py>=3.9
  - scikit-learn>=1.3
  - pybaselines>=1.1
  - pandas>=2.0
  - openpyxl>=3.1

  # GUI
  - pyside6>=6.6
  - pyqtgraph>=0.13
  - matplotlib>=3.8

  # FLMM backend via R fastFMM/rpy2
  - rpy2>=3.6
  # Windows R/rpy2 startup uses sh/make when validating R's config.
  - m2-base
  - m2-make

  # Quality-of-life / packaging
  - pip
  - setuptools
  - wheel
  - pyinstaller>=6.0
  - pyinstaller-hooks-contrib>=2024.0
