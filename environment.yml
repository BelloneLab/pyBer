# Create with:
#   conda env create -f environment.yml
#   conda activate pyBer
#
# Optional FLMM backend:
#   Rscript -e "install.packages('fastFMM', repos='https://cloud.r-project.org')"
#
# The R package is installed after environment creation because fastFMM is a
# CRAN package, not a conda package.
name: pyBer
channels:
  - conda-forge

variables:
  PYTHONNOUSERSITE: "1"

dependencies:
  # Core
  - python=3.11

  # Numeric and signal processing
  - libblas=*=*openblas
  - liblapack=*=*openblas
  - libcblas=*=*openblas
  - numpy>=1.24
  - scipy>=1.10
  - h5py>=3.9
  - scikit-learn>=1.3
  - pybaselines>=1.1
  - pandas>=2.0
  - openpyxl>=3.1
  # opencv powers LED sync-signal extraction from videos (ROI -> 1-D trace).
  # Batch extraction parallelizes across videos on the CPU via the stdlib
  # concurrent.futures (no extra package). The optional GPU path uses cv2.cuda
  # and only activates with a CUDA-enabled OpenCV build; the conda-forge package
  # below is CPU-only, so the code automatically falls back to multi-core CPU.
  - opencv>=4.13

  # GUI
  - pyside6>=6.6
  - pyqtgraph>=0.13
  - matplotlib>=3.8

  # FLMM backend via R fastFMM/rpy2.
  - r-base>=4.4
  - rpy2>=3.6

  # Windows R/rpy2 startup uses sh/make when validating R's config.
  - m2-base
  - m2-make

  # Quality-of-life / packaging
  - pip
  - setuptools
  - wheel
  - pyinstaller>=6.0
  - pyinstaller-hooks-contrib>=2024.0
